        const r = frame.getBoundingClientRect();

  /** Ctrl+P 시점 마우스 위치 → 인쇄 대상(좌·우·근거 미리보기) */
  function resolvePrintTarget() {
    if (document.activeElement === frame) {
      return { pane: "left", refArea: null };
    }
    if (frame && !frame.hidden) {
      const r = frame.getBoundingClientRect();
      if (_mouseX >= r.left && _mouseX <= r.right && _mouseY >= r.top && _mouseY <= r.bottom) {
        return { pane: "left", refArea: null };
      }
    }
    const el = document.elementFromPoint(_mouseX, _mouseY);
    if (el && paneRight && paneRight.contains(el)) {
      let refArea = null;
      if (refsList && refsList.contains(el)) refArea = "list";
      else if (refPreview && refPreview.contains(el)) refArea = "preview";
      else if (refPreview && !refPreview.hidden) refArea = "preview";
      return { pane: "right", refArea };
    }
    if (el && paneLeft && paneLeft.contains(el)) {
      return { pane: "left", refArea: null };
    }
    return {
      pane: activePane,
      refArea: activePane === "right" && refPreview && !refPreview.hidden ? "preview" : null,
    };
  }

  function applyPrintScope(pane, refArea) {
    const p = pane === "right" ? "right" : "left";
    document.body.classList.remove(
      "print-scope-left", "print-scope-right", "print-ref-preview", "print-ref-list-only"
    );
    document.body.classList.add(p === "right" ? "print-scope-right" : "print-scope-left");
    if (p === "right") {
      if (refArea === "list") {
        if (refPreview && !refPreview.hidden) {
          document.body.classList.add("print-ref-list-only");
        }
      } else if (refArea === "preview" || (refPreview && !refPreview.hidden)) {
        document.body.classList.add("print-ref-preview");
      }
    }
    if (p === "left" && !frame.hidden) {
      try {
        const doc = frame.contentDocument;
        const root = doc.documentElement;
        const h = Math.max(
          root.scrollHeight, root.offsetHeight,
          doc.body.scrollHeight, doc.body.offsetHeight
        );
        _printFrameHeight = frame.style.height;
        frame.style.height = Math.max(h, 400) + "px";
        frame.contentWindow.scrollTo(0, 0);
      } catch (_) { /* iframe 미로드 */ }
    }
  }

    const inp = body.querySelector("input[type=file]");

      const f = e.target.files[0];
      if (!f) return;
      const rd = new FileReader();
      rd.onload = ev => {
        try {
          _xlsxRenderWorkbook(new Uint8Array(ev.target.result));
          if (st) st.textContent = f.name + " · " + _xlsxCtx.wb.SheetNames.length + "개 시트";
        } catch (x) {
          body.innerHTML = '<div class="xlsx-fallback">읽기 실패: ' + x + "</div>";
        }
      };
      rd.readAsArrayBuffer(f);
    });
  }
  function mountXlsxViewer(container, encPath, label) {
    _xlsxCtx.root = container;
    _xlsxCtx.wb = null;
    const name = label || decodeURIComponent(encPath.split("/").pop());
    container.innerHTML =
      '<div class="xlsx-wrap"><div class="xlsx-head"><strong>' + name + "</strong>" +
      '<span class="xlsx-status">불러오는 중…</span></div>' +
      '<div class="xlsx-tabs"></div><div class="xlsx-body"></div></div>';
    if (typeof XLSX === "undefined") { _xlsxFallback(encPath); return; }
    fetch(encPath)
      .then(r => { if (!r.ok) throw new Error(r.status); return r.arrayBuffer(); })
      .then(buf => _xlsxRenderWorkbook(buf))
      .catch(() => _xlsxFallback(encPath));
  }
  function renderXlsxUrl(encPath, label) {
    showLeftPane("placeholder");
    mountXlsxViewer(placeholder, encPath, label);
  }

  function mountMdViewer(container, encPath, label) {
    const name = label || decodeURIComponent(encPath.split("/").pop());
    container.innerHTML = '<div class="md-body">불러오는 중…</div>';
    const body = container.querySelector(".md-body");
    const base = encPath.slice(0, encPath.lastIndexOf("/") + 1);
    fetch(encPath)
      .then(r => { if (!r.ok) throw new Error(r.status); return r.text(); })
      .then(txt => {
        if (typeof marked === "undefined") { body.innerHTML = "<pre>" + txt.replace(/[<&]/g, c => c === "<" ? "&lt;" : "&amp;") + "</pre>"; return; }
        body.innerHTML = marked.parse(txt);
        body.querySelectorAll('a[href]').forEach(a => {
          const h = a.getAttribute("href") || "";
          if (!/^([a-z]+:|\/|#)/i.test(h)) a.setAttribute("href", base + h);
          if (/^https?:/i.test(a.getAttribute("href"))) a.setAttribute("target", "_blank");
        });
      })
      .catch(() => {
        body.innerHTML = '<div class="xlsx-fallback"><h3>마크다운을 불러오지 못했습니다</h3>' +
          "<p>로컬 파일(file://)에서는 자동 읽기가 차단될 수 있습니다. " +
          "로컬 서버(http://localhost)로 포털을 여거나, 좌측 본문 탭을 이용하세요.</p></div>";
      });
  }
  function renderMdUrl(encPath, label) {
    showLeftPane("placeholder");
    mountMdViewer(placeholder, encPath, label);
  }

  /* 본문(좌) 안의 md/xlsx 링크만 좌측 미리보기 — 우측 근거자료 링크는 target=_blank 유지 */
  placeholder.addEventListener("click", e => {
    const a = e.target.closest ? e.target.closest("a[href]") : null;
    if (!a || a.hasAttribute("download") || a.classList.contains("xlsx-dl")) return;
    const href = a.getAttribute("href") || "";
    const label = (a.textContent || "").trim();
    if (/\.xls[xm]?(\?|#|$)/i.test(href)) {
      e.preventDefault();
      renderXlsxUrl(href, label);
    } else if (/\.md(\?|#|$)/i.test(href)) {
      e.preventDefault();
      renderMdUrl(href, label);
    }
  });

  tabBtns.forEach(btn => btn.addEventListener("click", () => switchTab(btn.dataset.tab)));
  document.addEventListener("click", closeAllDrops);
  buildDropNav();

  const HASH_ALIAS = { "um-review": "rv-all", "um-review-il": "rv-il" };
  const hash = HASH_ALIAS[location.hash.replace("#", "")] || location.hash.replace("#", "");
  if (TABS[hash]) switchTab(hash);
  else switchTab("jinmyeong");
})();
</script>
</body>
</html>
